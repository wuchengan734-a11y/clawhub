name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  VITE_CONVEX_URL: https://example.invalid

jobs:
  static:
    name: static
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Static checks
        run: bun run ci:static

  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: Coverage
        run: bun run ci:unit

  packages:
    name: packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: Package checks
        run: bun run ci:packages

  types-build:
    name: types-build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: Typecheck and build
        run: bun run ci:types-build

  e2e-http:
    name: e2e-http
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: HTTP e2e
        run: bun run ci:e2e-http

  playwright-smoke:
    name: playwright-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Browser e2e
        run: bun run ci:playwright-smoke

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  playwright-local-auth:
    name: playwright-local-auth
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Local-auth browser e2e
        run: bun run test:pw:local-auth

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-local-auth-report
          path: playwright-report/
          if-no-files-found: ignore
